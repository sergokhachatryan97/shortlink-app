<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 28" fill="none">
  <defs>
    <linearGradient id="compact-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Icon - slightly smaller for compact -->
  <rect x="0" y="0" width="28" height="28" rx="6" fill="url(#compact-grad)"/>
  <circle cx="10.5" cy="14" r="3" stroke="white" stroke-width="1.5" fill="none"/>
  <circle cx="21.5" cy="14" r="3" stroke="white" stroke-width="1.5" fill="none"/>
  <line x1="13.5" y1="14" x2="18.5" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Wordmark - tighter -->
  <text x="36" y="19" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="url(#compact-grad)">Trastly</text>
